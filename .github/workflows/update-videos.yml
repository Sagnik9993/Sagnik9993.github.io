name: Update Featured Videos

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Fetch channel video data
        run: |
          yt-dlp --flat-playlist --playlist-end 100 -J \
            "https://www.youtube.com/@windowstipsntricks/videos" > raw.json
          python3 scripts/parse-videos.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || git commit -m "Update featured videos"
          git push
