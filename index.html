<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagnik's Official Gallery</title>
    <style>
        /* Colorful Animated Title */
        @keyframes colorChange {
            0%   { color: #FF4747; }
            25%  { color: #00FF00; }
            50%  { color: #00CCFF; }
            75%  { color: #FFFF00; }
            100% { color: #FF4747; }
        }

        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 2px 2px 4px #000;
            font-size: 2.2em;
        }

        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #444;
            display: inline-block;
            text-align: left;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .media-card {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border-left: 4px solid #00CCFF;
        }

        video, audio {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            outline: none;
        }

        footer {
            margin-top: 50px;
            color: #777;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Sagnik's Multimedia Hub</h1>
    </marquee>

    <div class="container">
        <p style="font-size: 1.1em;">
            <b>Student:</b> St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="media-card">
            <p style="color: #FFD700; font-weight: bold; margin-bottom: 5px;">
                🎬 Featured: Powerhouse (Coolie)
            </p>
            <video controls>
                <source src="videoplayback.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="media-card" style="border-left-color: #00FF00;">
            <p style="color: #00FF00; font-weight: bold; margin-bottom: 5px;">
                🎵 Quick Play: Illuminati
            </p>
            <video controls style="max-height: 60px;">
                <source src="Illuminati Video..mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <footer>
        <p>
            Status: System Rectified | Birthday Countdown: 35 Days<br>
            Contact: <span style="color: #00FF00;">9588910208</span>
        </p>
    </footer>

</body>
</html>
