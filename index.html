<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information About Sagnik</title>
    <style>
        /* 🌈 RAINBOW ANIMATION */
        @keyframes colorChange {
            0%   { color: #FF4747; }
            25%  { color: #00FF00; }
            50%  { color: #00CCFF; }
            75%  { color: #FFFF00; }
            100% { color: #FF4747; }
        }
        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2.2em;
            font-weight: bold;
        }

        body {
            background-color: #00FFFF; /* Cyan Background */
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            /* Extra height so you can test the scrolling effect */
            min-height: 120vh; 
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #555;
            display: inline-block;
            text-align: left;
            max-width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 8px solid #FF4747;
            border-top: 8px solid #00CCFF;
            margin-top: 20px;
        }

        /* 🎬 STICKY "AD-STYLE" VIDEO BOX (FLOATING) */
        .sticky-video-card {
            position: fixed;    /* This is the secret to making it stick! */
            bottom: 20px;       /* 20px from bottom */
            right: 20px;        /* 20px from right */
            width: 280px;       /* Width like a small ad */
            background: #1a1a1a;
            padding: 10px;
            border-radius: 15px;
            border: 3px solid #FF4747;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10000;     /* Keeps it on top of everything */
        }

        #featured-video {
            width: 100%;
            border-radius: 10px;
            display: block;
            background: #000;
        }

        .video-label {
            color: #FF4747;
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 5px;
            display: block;
            text-align: center;
            font-family: monospace;
        }

        .music-link {
            margin-top: 30px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
        }

        a {
            color: #0000FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Information About Sagnik</h1>
    </marquee>

    <div class="container">
        <p style="font-size: 1.2em; line-height: 1.6;">
            <b>Standard:</b> 9th Standard, St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="music-link">
            <p>If you want to listen to some music to calm your mind 
               <br><br>
               <a href="playlist.html">🎵 CLICK HERE FOR PLAYLIST 🎵</a>
            </p>
        </div>
    </div>

    <div class="sticky-video-card">
        <span class="video-label">🎬 NOW PLAYING: ILLUMINATI</span>
        <video id="featured-video" autoplay loop muted playsinline>
            <source src="track.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
