<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagnik's Information</title>
    <style>
        @keyframes colorChange {
            0%   { color: #FF4747; }
            25%  { color: #00FF00; }
            50%  { color: #00CCFF; }
            75%  { color: #FFFF00; }
            100% { color: #FF4747; }
        }
        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2.2em;
            font-weight: bold;
        }
        body {
            background-color: #00FFFF; /* Cyan Background */
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #555;
            display: inline-block;
            text-align: left;
            max-width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 8px solid #FF4747;
            border-top: 8px solid #00CCFF;
        }
        .video-card {
            margin-top: 25px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 12px;
            border: 1px solid #ddd;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .music-link {
            margin-top: 30px;
            font-size: 1.1em;
            font-weight: bold;
        }
        a {
            color: #0000FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Information About Sagnik</h1>
    </marquee>

    <div class="container">
        <p style="font-size: 1.2em; line-height: 1.6;">
            <b>Standard:</b> 9th Standard, St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="video-card">
            <p style="color: #FF4747; font-weight: bold;">🎬 Featured Video: Illuminati (From "Aavesham")</p>
            <video controls>
                <source src="track.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="music-link">
            <p>If you want to listen to some music to calm your mind 
               <a href="playlist.html">click here</a>
            </p>
        </div>
    </div>

    <footer style="margin-top: 50px;">
        <p>Contact: <b>9588910208</b> for suggestions.. </p>
    </footer>

</body>
</html>
