<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagnik's Information</title>
    <style>
        /* Colorful Animated Title */
        @keyframes colorChange {
            0%   { color: #FF0000; }
            33%  { color: #0000FF; }
            66%  { color: #FFFF00; }
            100% { color: #FF0000; }
        }

        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 1px 1px 2px #FFF;
            font-size: 2.2em;
            font-weight: bold;
        }

        body {
            /* Changed background to Cyan as requested */
            background-color: #00FFFF; 
            color: #000; /* Dark text for better contrast on Cyan */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.8); /* Semi-transparent white for readability */
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #333;
            display: inline-block;
            text-align: left;
            max-width: 90%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .media-card {
            margin-top: 20px;
            padding: 15px;
            background: #FFF;
            border-radius: 10px;
            border: 1px solid #999;
        }

        video {
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            background: #000;
        }

        /* Specific fix for the 'Spacebar' video glitch */
        .illuminati-player {
            height: 50px; 
            object-fit: contain;
        }

        footer {
            margin-top: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Information About Sagnik</h1>
    </marquee>

    <div class="container">
        <p style="font-size: 1.1em; margin-bottom: 20px;">
            <b>Standard:</b> 8th Standard, St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="media-card">
            <p><b>🎬 Featured Video: Powerhouse (Coolie)</b></p>
            <video controls>
                <source src="videoplayback.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="media-card">
            <p><b>🎵 Quick Play: Illuminati</b></p>
            <video controls class="illuminati-player">
                <source src="Illuminati Video..mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <footer>
        <p>Contact: <span style="color: #0000FF;">9588910208</span></p>
    </footer>

</body>
</html>
