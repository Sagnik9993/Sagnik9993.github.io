<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagnik's Information</title>
    <style>
        @keyframes colorChange {
            0%   { color: #FF4747; }
            25%  { color: #00FF00; }
            50%  { color: #00CCFF; }
            75%  { color: #FFFF00; }
            100% { color: #FF4747; }
        }
        @keyframes rotateGlow {
            0% { border-color: #4285F4; box-shadow: 0 0 15px #4285F4; }
            25% { border-color: #DB4437; box-shadow: 0 0 15px #DB4437; }
            50% { border-color: #F4B400; box-shadow: 0 0 15px #F4B400; }
            75% { border-color: #0F9D58; box-shadow: 0 0 15px #0F9D58; }
            100% { border-color: #4285F4; box-shadow: 0 0 15px #4285F4; }
        }
        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2.2em;
            font-weight: bold;
        }
        body {
            background-color: #00FFFF;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            text-align: left;
            max-width: 85%;
            width: 500px;
            border-left: 12px solid rgba(255, 71, 71, 0.8);
            border-top: 12px solid rgba(0, 204, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1), opacity 1.2s ease;
            opacity: 0;
            transform: translateY(50px);
        }
        .container.reveal {
            opacity: 1;
            transform: translateY(0);
        }
        .video-card {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s ease;
        }
        .video-card:hover {
            transform: translateY(-10px) scale(1.02);
            animation: rotateGlow 3s linear infinite;
            background: rgba(255, 255, 255, 0.8);
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        .music-link {
            margin-top: 30px;
            font-size: 1.1em;
            font-weight: bold;
            padding: 15px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .music-link:hover {
            background: #ffffff;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }
        a {
            color: #0000FF;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Information About Sagnik</h1>
    </marquee>

    <div class="container" id="mainContainer">
        <p style="font-size: 1.2em; line-height: 1.6; color: #1a1a1a;">
            <b>Standard:</b> 9th Standard, St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="video-card">
            <p style="color: #FF4747; font-weight: bold; margin-top: 0;">🎬 Featured Video: Illuminati (From "Aavesham")</p>
            <video controls>
                <source src="track.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="music-link">
            <p style="margin: 0;">If you want to listen to some music to calm your mind 
               <a href="playlist.html">click here</a>
            </p>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('mainContainer').classList.add('reveal');
            }, 100);
        };
    </script>
</body>
</html>
