<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagnik's Information</title>
    <style>
        /* Colorful Animated Title - Restored */
        @keyframes colorChange {
            0%   { color: #FF4747; }
            25%  { color: #00FF00; }
            50%  { color: #00CCFF; }
            75%  { color: #FFFF00; }
            100% { color: #FF4747; }
        }

        .colorful-text {
            animation: colorChange 4s linear infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 2.2em;
            font-weight: bold;
        }

        body {
            background-color: #00FFFF; /* Cyan Background */
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #555;
            display: inline-block;
            text-align: left;
            max-width: 85%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* Corner Accents Restored */
            border-left: 8px solid #FF4747;
            border-top: 8px solid #00CCFF;
        }

        .media-card {
            margin-top: 25px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 12px;
            border: 1px solid #ddd;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Video Styles */
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
            background: #000;
        }

        /* Spacebar-Fix for Illuminati Player */
        .illuminati-player {
            height: 55px;
            width: 100%;
            object-fit: contain;
        }

        b {
            color: #2c3e50;
        }

        footer {
            margin-top: 50px;
            font-weight: bold;
            color: #444;
        }
    </style>
</head>
<body>

    <marquee scrollamount="8">
        <h1 class="colorful-text">Information About Sagnik</h1>
    </marquee>

    <div class="container">
        <p style="font-size: 1.2em; line-height: 1.6;">
            <b>Standard:</b> 8th Standard, St. James' School, Binnaguri<br>
            <b>Location:</b> Ethelbari, Checkpost
        </p>

        <div class="media-card">
            <p style="color: #FF4747; font-weight: bold;">🎬 Featured Video: Powerhouse (Coolie)</p>
            <video controls>
                <source src="videoplayback.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="media-card">
            <p style="color: #00CCFF; font-weight: bold;">🎵 Quick Play: Illuminati</p>
            <video controls class="illuminati-player">
                <source src="Illuminati Video..mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <footer>
        <p>Contact: <span style="color: #0000FF;">9588910208</span></p>
    </footer>

</body>
</html>
