<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="robots" content="noindex, nofollow"/>
    <title>Sagnik's Relaxing Library</title>
    <style>
        /* Base layout (unchanged structure and colors you used) */
        body {
            background-color: #00FFFF;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background-attachment: fixed;
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            text-align: left;
            width: 95%;
            max-width: 600px;
            border-left: 12px solid rgba(255, 71, 71, 0.8);
            border-top: 12px solid rgba(0, 204, 255, 0.8);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        h1 { color: #333; margin: 0 0 12px 0; }

        /* Song card base (keeps your original look but prepares for animated border) */
        .song-card, .video-card {
            position: relative;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 12px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            overflow: visible;
            z-index: 1;
        }

        .song-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .song-title { font-weight: bold; font-size: 0.95em; color: #1a1a1a; display: block; margin-bottom: 10px; }
        audio { width: 100%; height: 35px; display:block; }

        .video-card video {
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }

        .footer-text { font-size: 0.75em; color: #333; margin-top: 20px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; text-align: center; }
        .gemini-link { color: #0056b3; font-weight: bold; font-style: italic; text-decoration: none; }
        center a { font-weight:bold; color: #00008b; text-decoration:none; border-bottom: 2px solid #00008b; }

        /* ---------------------------
           Animated multi-color "sound card" border
           - Uses a blurred conic-gradient pseudo-element behind each card
           - Animation rotates the gradient so colors circulate
           - nth-child selectors offset animation phase so cards show different dominant colors
           - Color order used: red → blue → green → yellow (circulating)
           --------------------------- */

        .song-card::before {
            content: "";
            position: absolute;
            inset: -6px; /* makes the colored ring visible outside the card */
            border-radius: 16px;
            z-index: 0;
            pointer-events: none;
            /* conic gradient with the requested color order (red, blue, green, yellow) */
            background: conic-gradient(
                #EA4335 0deg 90deg,   /* red */
                #4285F4 90deg 180deg, /* blue */
                #34A853 180deg 270deg,/* green */
                #FBBC05 270deg 360deg  /* yellow */
            );
            filter: blur(8px);
            opacity: 0.95;
            transform: rotate(0deg);
            transition: opacity 0.25s ease;
            animation: rotateColors 6s linear infinite;
        }

        /* Keep card content above the animated ring */
        .song-card > * { position: relative; z-index: 1; }

        /* Rotation animation for the conic gradient */
        @keyframes rotateColors {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
