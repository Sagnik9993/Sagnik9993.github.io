<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Calm Your Mind | System Optimized</title>
    <style>
        body {
            margin: 0; padding: 20px; text-align: center; font-family: 'Segoe UI', sans-serif;
            background: #00FFFF; overflow-x: hidden;
        }
        
        /* THE AI CIRCLE EFFECT (Optimized) */
        .ai-circle-container {
            position: relative; width: 100px; height: 100px; margin: 0 auto 20px;
        }
        .ai-circle {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #4285F4, #9b51e0, #ff4747, #f4b400);
            filter: blur(8px); opacity: 0.7;
            animation: rotate 4s linear infinite, pulse-glow 2s ease-in-out infinite alternate;
        }
        @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
        @keyframes pulse-glow { from {transform: scale(0.9); opacity: 0.5;} to {transform: scale(1.1); opacity: 0.9;} }
        
        .status-bar { 
            display: inline-flex; align-items: center; background: white; padding: 6px 18px; 
            border-radius: 50px; border: 2px solid #1a1a1a; font-size: 0.85em; font-weight: 800; margin-bottom: 15px;
        }
        .pulse-dot { width: 8px; height: 8px; background: #0f0; border-radius: 50%; margin-right: 8px; animation: p 1.5s infinite; }
        @keyframes p { 0% {box-shadow: 0 0 0 0 #0f0;} 70% {box-shadow: 0 0 0 8px #0f00;} }

        .container { 
            background: white; padding: 25px; border-radius: 25px; 
            display: inline-block; text-align: left; width: 95%; max-width: 600px;
            border-left: 10px solid #FF4747; border-top: 10px solid #4285F4;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .song-card {
            background: #f9f9f9; margin-bottom: 15px; padding: 15px; border-radius: 15px;
            border: 2px solid #eee; transition: 0.3s; opacity: 0; transform: translateY(20px);
        }
        .song-card.reveal { opacity: 1; transform: translateY(0); }
        .song-card:hover { border-color: #4285F4; transform: scale(1.02); background: #fff; }

        #np { 
            position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; color: #fff; padding: 12px 25px; border-radius: 50px;
            transition: 0.4s; z-index: 99; font-weight: bold; border: 2px solid #00FFFF;
        }
        #np.active { bottom: 25px; }

        .title { font-weight: 800; display: block; margin-bottom: 10px; color: #1a1a1a; }
        audio, video { width: 100%; border-radius: 10px; }
        center a { font-weight: 900; color: blue; text-decoration: none; border-bottom: 2px solid blue; }
    </style>
</head>
<body>

    <div class="ai-circle-container">
        <div class="ai-circle"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 1.2em; color: #1a1a1a;">S</div>
    </div>

    <div class="status-bar">
        <div class="pulse-dot"></div>
    </div>

    <h1>🎵 Calm Your Mind</h1>

    <div id="np">Playing: <span id="tn" style="color:#0ff">None</span></div>

    <div class="container">
        <div class="song-card"><span class="title">1. ATLXS - Passo Bem Solto</span><audio controls preload="none"><source src="track4.mp3"></audio></div>
        <div class="song-card"><span class="title">2. Illuminati - Aavesham</span><audio controls preload="none"><source src="track11.mp3"></audio></div>
        <div class="song-card"><span class="title">3. Aayi Nai - Stree 2</span><audio controls preload="none"><source src="track2.mp3"></audio></div>
        <div class="song-card"><span class="title">4. Armadham - Aavesham</span><audio controls preload="none"><source src="track3.mp3"></audio></div>
        <div class="video-card" style="margin-top:20px;">
            <span class="title" style="color:red">🎬 Featured Video</span>
            <video controls preload="none"><source src="videoplayback.mp4"></video>
        </div>

        <br><center><a href="index.html">← Back to Profile</a></center>
    </div>

    <script>
        function reveal() {
            document.querySelectorAll(".song-card, .video-card").forEach((c, i) => {
                if (c.getBoundingClientRect().top < window.innerHeight - 50) {
                    c.style.transitionDelay = (i % 5 * 0.1) + "s";
                    c.classList.add("reveal");
                }
            });
        }
        document.addEventListener('play', e => {
            document.querySelectorAll('audio, video').forEach(p => { if(p != e.target) p.pause(); });
            document.getElementById('tn').innerText = e.target.closest('div').querySelector('.title').innerText;
            document.getElementById('np').classList.add('active');
        }, true);
        document.addEventListener('pause', () => {
            let playing = Array.from(document.querySelectorAll('audio, video')).some(p => !p.paused);
            if(!playing) document.getElementById('np').classList.remove('active');
        }, true);
        window.onscroll = reveal; window.onload = reveal;
    </script>
</body>
</html>
