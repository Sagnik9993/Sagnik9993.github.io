<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sagnik's Relaxing Library</title>
    <style>
        body {
            background-color: #00FFFF;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            text-align: left;
            width: 95%;
            max-width: 600px;
            border-left: 12px solid rgba(255, 71, 71, 0.8);
            border-top: 12px solid rgba(0, 204, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }
        .song-card, .video-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            margin-bottom: 25px;
            padding: 12px;
            border-radius: 12px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1), opacity 1.2s ease, border 0.4s ease;
            position: relative;
            opacity: 0;
            transform: translateY(80px);
        }
